services:
  - type: web
    name: nifty-oi-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python oi_dashboard.py
    envVars:
      - key: KITE_API_KEY
        sync: false          # set manually in Render dashboard
      - key: KITE_ACCESS_TOKEN
        sync: false          # set manually in Render dashboard
      - key: PYTHON_VERSION
        value: "3.11.0"
